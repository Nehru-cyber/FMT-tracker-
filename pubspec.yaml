name: fmt_tracker
description: "FMT Tracker - Finance & Expense Tracker App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  uuid: ^4.4.2
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  pdf: ^3.10.8
  printing: ^5.12.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_timezone: ^5.0.1
  local_auth: ^3.0.1
  image_picker: ^1.2.1
  audioplayers: ^6.6.0
  file_picker: ^8.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^1.1.3
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
